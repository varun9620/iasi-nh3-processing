# iasi-nh3-processing configuration
#
# Adjust these paths to match your machine before running anything.

data:
  # Root folder holding one sub-folder per year, e.g. data/METOP-C/2023/...
  base_dir: "data/METOP-C"

  # Filename pattern; {date} is substituted with YYYYMMDD
  file_pattern: "IASI_METOPC_L2_NH3_{date}_ULB-LATMOS_V4.0.0R.nc"

  # Exact dates to process (YYYY-MM-DD). Takes priority over `years` below
  # if present - use this when you only have specific sample days.
  dates: ["2023-01-01", "2023-01-02", "2023-01-03"]

  # Fallback: years to process (inclusive) if `dates` above is not set.
  # Only dates with a matching file are used; missing dates are skipped
  # and logged, so this can stay broad.
  years: [2023]

  # Target regular lat/lon grid the swath data gets regridded onto.
  # Generated on the fly - no external .mat file needed.
  grid:
    lonmin: -25
    lonmax: 45
    latmin: 34
    latmax: 72
    resolution_deg: 0.1   # ~11 km at these latitudes

output:
  # Where the combined, gridded NetCDF file is written
  nc_file: "outputs/IASI_METOPC_NH3_2019_2023.nc"

qc:
  quality_flag_threshold: 1     # keep postfilter == 1
  daytime_flag_threshold: 0     # keep AMPM == 0 (daytime)
  cloud_cover_threshold: 0.25   # keep cloud_coverage < 0.25

plot:
  region: europe
  output_dir: outputs/plots
  regions:
    europe:
      lonmin: -25
      lonmax: 45
      latmin: 34
      latmax: 72
    global:
      lonmin: -180
      lonmax: 180
      latmin: -90
      latmax: 90
